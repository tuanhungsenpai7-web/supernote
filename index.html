<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Notes Pro - Ultimate NotebookLM Ready</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #eef2f6;
            --sidebar-bg: linear-gradient(180deg, #1e1e2f 0%, #2a2a40 100%);
            --sidebar-text: #b3b3cc;
            --sidebar-hover: #ffffff;
            --primary-color: #6c5ce7;
            --primary-hover: #a29bfe;
            --card-bg: #ffffff;
            --text-dark: #2d3436;
            --border-light: #dfe6e9;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, button, input, select, textarea, .topbar, .sidebar-header, .subject-item, .tab { 
            font-family: 'Inter', sans-serif; 
        }

        body { display: flex; height: 100vh; background-color: var(--bg-body); overflow: hidden; transition: all 0.3s;}

        .btn-main { padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: var(--primary-hover); }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .login-card h2 { color: var(--primary-color); margin-bottom: 20px; font-weight: 700; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border-light); border-radius: 10px; outline: none; }
        .input-group input:focus { border-color: var(--primary-color); }

        #app-container { display: none; width: 100%; height: 100%; }
        
        #sidebar { 
            width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; 
            box-shadow: 2px 0 15px rgba(0,0,0,0.1); z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            flex-shrink: 0; overflow-x: hidden; white-space: nowrap;
        }
        #sidebar.collapsed { width: 0; min-width: 0; opacity: 0; }

        .user-profile { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; color: white; }
        .avatar { width: 45px; height: 45px; background: var(--primary-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px;}
        .user-info p { font-size: 12px; color: var(--sidebar-text); }
        .user-info h4 { font-size: 16px; margin-top: 3px; }
        .logout-btn { background: none; border: none; color: #ff7675; cursor: pointer; font-size: 12px; margin-top: 5px; }
        
        .sidebar-header { padding: 20px; color: var(--sidebar-text); font-size: 12px; text-transform: uppercase; font-weight: 700; }
        #subject-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0 10px;}
        #subject-list::-webkit-scrollbar { width: 5px; }
        #subject-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
        
        .subject-item { padding: 12px 15px; margin-bottom: 5px; cursor: pointer; border-radius: 10px; color: var(--sidebar-text); transition: 0.3s; display: flex; align-items: center; gap: 10px; justify-content: space-between;}
        .subject-item:hover { background: rgba(255,255,255,0.05); color: var(--sidebar-hover); }
        .subject-item.active { background: var(--primary-color); color: white; }

        /* UI Hành động sửa/xóa Môn học */
        .subject-actions { display: flex; gap: 8px; opacity: 0; transition: 0.2s; }
        .subject-item:hover .subject-actions, .subject-item.active .subject-actions { opacity: 1; }
        .subject-actions i { color: #a0aec0; transition: 0.2s; font-size: 13px;}
        .subject-actions i:hover { color: #ff7675; transform: scale(1.1);}
        .subject-item.active .subject-actions i { color: rgba(255,255,255,0.7); }
        .subject-item.active .subject-actions i:hover { color: #fff; }
        
        /* KHU VỰC NÚT IMPORT / EXPORT */
        .sidebar-actions { padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        #add-subject-btn { padding: 12px; background: rgba(255,255,255,0.1); color: white; border: 1px dashed rgba(255,255,255,0.3); border-radius: 10px; cursor: pointer; width: 100%; transition: 0.3s;}
        #add-subject-btn:hover { background: rgba(255,255,255,0.2); }
        .io-buttons { display: flex; gap: 8px; width: 100%; }
        .btn-io { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); color: var(--sidebar-text); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-io:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-body); padding: 15px; gap: 15px; overflow: hidden; position: relative; min-width: 0;}
        
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 15px; width: 100%; }
        .topbar-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        #menu-toggle-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-dark); flex-shrink: 0; display: block; }
        
        #tabs-container { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; align-items: center; }
        #tabs-container::-webkit-scrollbar { display: none; }
        .tab { display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; white-space: nowrap; border: 1px solid var(--border-light); transition: 0.2s;}
        .tab.active { background: var(--text-dark); color: white; border-color: var(--text-dark); }
        
        /* UI Hành động sửa/xóa Tab */
        .tab-actions { display: flex; gap: 6px; color: #a0aec0; }
        .tab.active .tab-actions { color: rgba(255,255,255,0.7); }
        .tab-actions i { cursor: pointer; transition: 0.2s; font-size: 12px; }
        .tab-actions i:hover { color: #ff7675; transform: scale(1.2); }
        .tab.active .tab-actions i:hover { color: #fff; }

        #add-tab-btn { padding: 10px 15px; background: white; border: 1px dashed var(--border-light); border-radius: 10px; cursor: pointer; flex-shrink: 0; font-size: 14px; white-space: nowrap;}

        .actions { display: flex; gap: 10px; flex-shrink: 0; align-items: center;}
        .btn-action { padding: 10px 15px; background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 13px;}
        .btn-action:hover { background: var(--primary-color); color: white; }

        #editor-wrapper { flex-grow: 1; display: flex; flex-direction: column; background: var(--card-bg); border-radius: 15px; box-shadow: var(--shadow); overflow: hidden; position: relative;}
        
        #editor { flex-grow: 1; font-size: 16px; background: white; padding: 10px; font-family: 'Inter', sans-serif; transition: 0.2s;}
        
        .ql-editor { overflow-x: auto !important; font-size: inherit !important; }
        .katex { font-size: 1.15em !important; text-rendering: auto; }
        .katex-display { overflow-x: auto !important; overflow-y: hidden !important; padding-bottom: 8px; }
        
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid var(--border-light) !important; padding: 10px !important; background: #fdfdfd; font-family: 'Inter', sans-serif;}
        .ql-container.ql-snow { border: none !important; }

        /* NÚT ẨN/HIỆN ĐÁP ÁN (FLASHCARD) */
        .ql-toolbar .ql-answer { color: #e84393; width: 30px; }
        .ql-toolbar .ql-answer:hover { color: #d63031; }
        
        .sn-answer-block {
            border-left: 4px solid #00b894; background: #e8f7f0; padding: 10px 15px; margin: 10px 0;
            border-radius: 4px 8px 8px 4px; position: relative; transition: 0.2s ease-in-out;
        }
        .sn-answer-block.hidden {
            height: 42px; padding: 0; overflow: hidden; background: #dfe6e9;
            border-left-color: #b2bec3; cursor: pointer; display: flex; align-items: center;
        }
        .sn-answer-block.hidden * { opacity: 0 !important; pointer-events: none; }
        .sn-answer-block.hidden::after {
            content: '👁️ Đáp án đang ẩn (Nhấn vào để xem)'; position: absolute; left: 15px;
            color: #2d3436; font-size: 14px; font-weight: 600;
        }

        #overlay-mobile { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; }
        .view-select { padding: 8px; border-radius: 8px; border: 1px solid var(--border-light); outline: none; font-size: 13px; background: white;}

        @media (max-width: 768px) {
            .topbar { flex-direction: column; align-items: stretch; }
            .topbar-left { width: 100%; }
            body:not(.force-desktop) #sidebar { position: fixed; top: 0; left: -260px; height: 100%; opacity: 1;}
            body:not(.force-desktop) #sidebar.open { left: 0; }
            body:not(.force-desktop) #overlay-mobile.show { display: block; }
            body:not(.force-desktop) .actions { flex-direction: row; width: 100%; justify-content: space-between; overflow-x: auto; padding-bottom: 5px; }
        }

        body.force-mobile { justify-content: center; background: #333; }
        body.force-mobile #app-container { width: 400px; height: 90vh; margin-top: 5vh; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: var(--bg-body); position: relative;}
        body.force-mobile .topbar { flex-direction: column; align-items: stretch; }
        body.force-mobile .actions { flex-direction: row; width: 100%; justify-content: space-between; overflow-x: auto;}
        body.force-mobile #sidebar { position: absolute; top: 0; left: -260px; height: 100%; opacity: 1;}
        body.force-mobile #sidebar.open { left: 0; }
        body.force-mobile #overlay-mobile.show { display: block; position: absolute; }
        
        body.force-desktop { min-width: 1024px; overflow: auto; }
        body.force-desktop #sidebar { position: static; height: auto; opacity: 1;}
        body.force-desktop #sidebar.collapsed { width: 0; min-width: 0; opacity: 0; padding: 0; }
        body.force-desktop .topbar { flex-direction: row; }
        body.force-desktop #overlay-mobile.show { display: none !important; }
        
        #pdf-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
        .pdf-card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .margin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .margin-item input { width: 100%; padding: 8px; border: 1px solid var(--border-light); border-radius: 5px; }
        .pdf-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { padding: 10px 15px; border: none; background: #f1f2f6; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div id="overlay-mobile" onclick="toggleSidebar()"></div>

    <div id="login-overlay">
        <div class="login-card">
            <h2>Super Notes AI</h2>
            <div class="input-group"><input type="text" id="username" placeholder="Tên đăng nhập" autocomplete="off"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Mật khẩu (Tùy chọn)" autocomplete="off"></div>
            <button class="btn-main" style="width:100%" onclick="handleLogin()">Vào Hệ Thống</button>
        </div>
    </div>

    <div id="pdf-modal">
        <div class="pdf-card">
            <h3 style="margin-bottom:10px; font-family: 'Inter', sans-serif;"><i class="fa-solid fa-file-pdf" style="color: #e55039;"></i> Cấu hình giấy A4 (mm)</h3>
            <div class="margin-grid">
                <div class="margin-item"><label>Trên</label><input type="number" id="m-top" value="20"></div>
                <div class="margin-item"><label>Dưới</label><input type="number" id="m-bottom" value="20"></div>
                <div class="margin-item"><label>Trái</label><input type="number" id="m-left" value="25"></div>
                <div class="margin-item"><label>Phải</label><input type="number" id="m-right" value="20"></div>
            </div>
            <div class="pdf-actions">
                <button class="btn-cancel" onclick="document.getElementById('pdf-modal').style.display='none'">Hủy</button>
                <button class="btn-main" onclick="exportToPDF()">Xuất PDF</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div class="user-profile">
                <div class="avatar" id="avatar-text">T</div>
                <div class="user-info">
                    <p>Xin chào,</p>
                    <h4 id="display-name">User</h4>
                    <button class="logout-btn" onclick="handleLogout()">Đăng xuất</button>
                </div>
            </div>
            
            <div class="sidebar-header">Môn học</div>
            <ul id="subject-list"></ul>
            
            <div class="sidebar-actions">
                <button id="add-subject-btn">+ Thêm Môn</button>
                <div class="io-buttons">
                    <button class="btn-io" onclick="exportSubjectJSON()" title="Xuất Môn học ra file JSON"><i class="fa-solid fa-download"></i> Tải Xuất</button>
                    <button class="btn-io" onclick="document.getElementById('import-file').click()" title="Nhập Môn học từ file"><i class="fa-solid fa-upload"></i> Tải Nhập</button>
                    <input type="file" id="import-file" style="display:none" accept=".json" onchange="importSubjectJSON(event)">
                </div>
            </div>
        </div>

        <div id="main-content">
            <div class="topbar">
                
                <div class="topbar-left">
                    <button id="menu-toggle-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                    <div id="tabs-container"></div>
                    <button id="add-tab-btn" onclick="addNewTab()">+ Thêm Tab</button>
                </div>
                
                <div class="actions">
                    <select class="view-select" onchange="changeZoom(this.value)" title="Phóng to/Thu nhỏ chữ">
                        <option value="14px">Cỡ chữ: 14</option>
                        <option value="16px" selected>Cỡ chữ: 16</option>
                        <option value="20px">Cỡ chữ: 20</option>
                        <option value="24px">Cỡ chữ: 24</option>
                        <option value="28px">Cỡ chữ: 28</option>
                    </select>

                    <select class="view-select" onchange="changeViewMode(this.value)">
                        <option value="auto">Giao diện: Tự động</option>
                        <option value="desktop">Giao diện: Máy tính</option>
                        <option value="mobile">Giao diện: Điện thoại</option>
                    </select>
                    
                    <button class="btn-action" onclick="document.getElementById('pdf-modal').style.display='flex'"><i class="fa-solid fa-print"></i> PDF</button>
                </div>

            </div>
            
            <div id="editor-wrapper">
                <div id="editor"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // KHỞI TẠO TÍNH NĂNG ẨN HIỆN ĐÁP ÁN CHO QUILL
        // ==========================================
        const Block = Quill.import('blots/block');
        class AnswerBlot extends Block {
            static create(value) {
                let node = super.create();
                node.classList.add('sn-answer-block');
                node.classList.add('hidden'); 
                return node;
            }
            static formats(node) { return node.classList.contains('sn-answer-block'); }
        }
        AnswerBlot.blotName = 'answer';
        AnswerBlot.tagName = 'DIV';
        AnswerBlot.className = 'sn-answer-block';
        Quill.register(AnswerBlot);

        var icons = Quill.import('ui/icons');
        icons['answer'] = '<i class="fa-solid fa-eye-slash" title="Bôi đen văn bản và nhấn để Ẩn/Hiện đáp án" style="font-size: 16px; display:flex; align-items:center; justify-content:center; height:100%;"></i>';

        document.getElementById('editor').addEventListener('click', function(e) {
            let block = e.target.closest('.sn-answer-block');
            if (block) block.classList.toggle('hidden');
        });

        // ==========================================
        // CẤU HÌNH FIREBASE & ỨNG DỤNG
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD5HQrVrAaVyEjO-ICJm8RuCh6NawEAf-g",
            authDomain: "hupernotes.firebaseapp.com",
            databaseURL: "https://hupernotes-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hupernotes",
            storageBucket: "hupernotes.firebasestorage.app",
            messagingSenderId: "442618106279",
            appId: "1:442618106279:web:ba42bbd1094d48ce7be682"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let appData = { subjects: [] };
        let currentSubjectId = null;
        let currentDocId = null;
        let quill;

        document.getElementById('tabs-container').addEventListener('wheel', (evt) => {
            evt.preventDefault();
            document.getElementById('tabs-container').scrollLeft += evt.deltaY;
        });

        window.onload = () => {
            if(localStorage.getItem('sn_current_user')) {
                currentUser = localStorage.getItem('sn_current_user');
                initApp();
            }
        };

        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            if(!user) return alert("Nhập tên đăng nhập!");
            currentUser = user;
            localStorage.setItem('sn_current_user', currentUser);
            initApp();
        }

        function handleLogout() {
            localStorage.removeItem('sn_current_user');
            location.reload();
        }

        function saveData() { 
            localStorage.setItem(`sn_data_${currentUser}`, JSON.stringify(appData)); 
            if(currentUser) {
                db.ref('users/' + currentUser).set(appData).catch(error => console.error("Lỗi đồng bộ Firebase:", error));
            }
        }
        
        function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }

        async function initApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('display-name').textContent = currentUser;
            document.getElementById('avatar-text').textContent = currentUser.charAt(0).toUpperCase();

            try {
                const snapshot = await db.ref('users/' + currentUser).once('value');
                if (snapshot.exists()) {
                    appData = snapshot.val();
                    if (!appData.subjects) appData.subjects = [];
                } else {
                    appData = JSON.parse(localStorage.getItem(`sn_data_${currentUser}`)) || { subjects: [] };
                }
            } catch (error) {
                appData = JSON.parse(localStorage.getItem(`sn_data_${currentUser}`)) || { subjects: [] };
            }
            
            if(!quill) {
                window.katex = katex;
                quill = new Quill('#editor', {
                    theme: 'snow',
                    modules: { 
                        formula: true, 
                        toolbar: {
                            container: [
                                [{ 'font': [] }, { 'size': [] }],
                                [{ 'header': [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                ['answer'], 
                                [{ 'script': 'sub'}, { 'script': 'super' }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['formula', 'image', 'code-block'],
                                ['clean']
                            ],
                            handlers: {
                                'answer': function() {
                                    let range = quill.getSelection();
                                    if (range) {
                                        let format = quill.getFormat(range);
                                        quill.format('answer', !format.answer);
                                    }
                                }
                            }
                        }
                    },
                    placeholder: 'Soạn thảo hoặc dán nội dung từ AI vào đây...'
                });

                quill.on('text-change', () => {
                    if(currentSubjectId && currentDocId) {
                        let doc = appData.subjects.find(s => s.id === currentSubjectId).docs.find(d => d.id === currentDocId);
                        if(doc) { doc.content = quill.root.innerHTML; saveData(); }
                    }
                });

                quill.root.addEventListener('paste', handleAIPaste, true);
            }

            renderSubjects();
            renderTabs();
        }

        // ==========================================
        // NHẬP / XUẤT JSON
        // ==========================================
        function exportSubjectJSON() {
            if(!currentSubjectId) return alert("Vui lòng chọn 1 môn học bên thanh menu để xuất file!");
            let subject = appData.subjects.find(s => s.id === currentSubjectId);
            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(subject));
            let downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `SuperNotes_${subject.name}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importSubjectJSON(event) {
            let file = event.target.files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let importedData = JSON.parse(e.target.result);
                    if(importedData.name && Array.isArray(importedData.docs)) {
                        importedData.id = generateId(); 
                        importedData.docs.forEach(doc => doc.id = generateId());
                        appData.subjects.push(importedData);
                        saveData(); renderSubjects();
                        alert(`Đã tải lên môn học: "${importedData.name}" thành công!`);
                    } else {
                        alert("File JSON không hợp lệ!");
                    }
                } catch(err) { alert("Lỗi đọc file JSON."); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function changeZoom(size) { document.getElementById('editor').style.fontSize = size; }

        // ==========================================
        // ĐỔI TÊN VÀ XÓA (MÔN HỌC & TAB)
        // ==========================================
        function renameSubject(id) {
            let subject = appData.subjects.find(s => s.id === id);
            let newName = prompt("Đổi tên môn học:", subject.name);
            if (newName && newName.trim() !== "") {
                subject.name = newName.trim();
                saveData(); renderSubjects();
            }
        }

        function deleteSubject(id) {
            let subject = appData.subjects.find(s => s.id === id);
            if (confirm(`Bạn có chắc muốn xóa vĩnh viễn môn học "${subject.name}"?`)) {
                appData.subjects = appData.subjects.filter(s => s.id !== id);
                if (currentSubjectId === id) {
                    currentSubjectId = appData.subjects.length > 0 ? appData.subjects[0].id : null;
                    currentDocId = currentSubjectId && appData.subjects[0].docs.length > 0 ? appData.subjects[0].docs[0].id : null;
                }
                saveData(); renderSubjects(); renderTabs();
            }
        }

        function renameTab(id) {
            let subject = appData.subjects.find(s => s.id === currentSubjectId);
            let doc = subject.docs.find(d => d.id === id);
            let newTitle = prompt("Đổi tên Tab:", doc.title);
            if (newTitle && newTitle.trim() !== "") {
                doc.title = newTitle.trim();
                saveData(); renderTabs();
            }
        }

        function deleteTab(id) {
            let subject = appData.subjects.find(s => s.id === currentSubjectId);
            let doc = subject.docs.find(d => d.id === id);
            if (confirm(`Bạn có chắc muốn xóa tab "${doc.title}"?`)) {
                subject.docs = subject.docs.filter(d => d.id !== id);
                if (currentDocId === id) {
                    currentDocId = subject.docs.length > 0 ? subject.docs[0].id : null;
                }
                saveData(); renderTabs(); loadEditorContent();
            }
        }

        // ==========================================
        // BỘ XỬ LÝ DÁN NÂNG CẤP V4 (SỬA LỖI XUỐNG DÒNG)
        // ==========================================
        function handleAIPaste(e) {
            e.preventDefault();
            let clipboardHTML = e.clipboardData.getData('text/html');
            let clipboardText = e.clipboardData.getData('text/plain');
            
            let processedText = clipboardText || '';

            if (clipboardHTML) {
                let parser = new DOMParser();
                let doc = parser.parseFromString(clipboardHTML, 'text/html');
                
                let mathNodes = doc.querySelectorAll('math, .katex, mjx-container, .math-wrapper, [data-tex]');
                mathNodes.forEach(node => {
                    let tex = '';
                    let anno = node.querySelector('annotation[encoding="application/x-tex"], annotation');
                    if (anno) {
                        tex = anno.textContent;
                    } else if (node.getAttribute('data-tex')) {
                        tex = node.getAttribute('data-tex');
                    } else {
                        let mathml = node.querySelector('math, .katex-mathml');
                        if(mathml) tex = mathml.textContent;
                        else tex = node.textContent; 
                    }
                    if (tex && tex.trim() !== '') {
                        node.replaceWith(doc.createTextNode(` $$${tex.trim()}$$ `));
                    }
                });

                doc.querySelectorAll('.katex-html').forEach(el => el.remove());

                let turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-' });
                turndownService.escape = function (str) { return str; };
                
                // ĐÃ LOẠI BỎ LỆNH 'KEEP' GÂY LỖI CHẬP DÒNG DẤU SAO (*).
                turndownService.keep(['sup', 'sub']); 
                
                processedText = turndownService.turndown(doc.body.innerHTML);
            }

            if (!processedText) return;

            processedText = processedText.replace(/[\u200B-\u200D\uFEFF]/g, ''); 
            processedText = processedText.replace(//g, '\\not ');
            
            processedText = processedText.replace(/α/g, '\\alpha ');
            processedText = processedText.replace(/β/g, '\\beta ');
            processedText = processedText.replace(/γ/g, '\\gamma ');
            processedText = processedText.replace(/Δ/g, '\\Delta ');
            processedText = processedText.replace(/π/g, '\\pi ');

            let mathBlocks = [];
            const saveMath = (formula, isBlock) => {
                let id = `MATHBLOCK${mathBlocks.length}XYZ`; 
                let cleanFormula = formula.trim().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                let latexCode = isBlock ? `\\displaystyle ${cleanFormula}` : cleanFormula;
                mathBlocks.push({ id, html: `<span class="ql-formula" data-value="${latexCode}"></span>` });
                return id;
            };

            processedText = processedText.replace(/\$\$(.*?)\$\$/gs, (m, f) => saveMath(f, true));
            processedText = processedText.replace(/\\\[(.*?)\\\]/gs, (m, f) => saveMath(f, true));
            processedText = processedText.replace(/(?<!\$)\$(?!\$)(.*?)(?<!\$)\$(?!\$)/g, (m, f) => saveMath(f, false));
            processedText = processedText.replace(/\\\((.*?)\\\)/gs, (m, f) => saveMath(f, false));

            processedText = processedText.replace(/\\(int|frac|sum|sqrt|lim|rightarrow|Delta|pi|alpha|beta|ce|mu|neq|pm|infty|not)/g, '\\\\$1');

            let finalHTML = marked.parse(processedText);

            mathBlocks.forEach(block => {
                finalHTML = finalHTML.replace(block.id, block.html);
            });

            let range = quill.getSelection(true) || { index: quill.getLength() };
            quill.clipboard.dangerouslyPasteHTML(range.index, finalHTML);
        }

        // ==========================================
        // GIAO DIỆN & RENDER
        // ==========================================
        function changeViewMode(mode) {
            document.body.classList.remove('force-desktop', 'force-mobile');
            if (mode === 'desktop') document.body.classList.add('force-desktop');
            if (mode === 'mobile') document.body.classList.add('force-mobile');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay-mobile');
            const isMobile = window.innerWidth <= 768 || document.body.classList.contains('force-mobile');
            if (isMobile && !document.body.classList.contains('force-desktop')) {
                sidebar.classList.toggle('open'); overlay.classList.toggle('show');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            appData.subjects.forEach(sub => {
                let li = document.createElement('li');
                li.className = `subject-item ${sub.id === currentSubjectId ? 'active' : ''}`;
                
                let nameDiv = document.createElement('div');
                nameDiv.innerHTML = `<i class="fa-solid fa-folder"></i> ${sub.name}`;
                nameDiv.style.flexGrow = '1'; nameDiv.style.overflow = 'hidden'; nameDiv.style.textOverflow = 'ellipsis';
                nameDiv.onclick = () => {
                    currentSubjectId = sub.id;
                    currentDocId = sub.docs.length > 0 ? sub.docs[0].id : null;
                    renderSubjects(); renderTabs();
                    if(window.innerWidth <= 768 && !document.body.classList.contains('force-desktop')) {
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('overlay-mobile').classList.remove('show');
                    }
                };
                li.appendChild(nameDiv);

                let actionsDiv = document.createElement('div');
                actionsDiv.className = 'subject-actions';
                
                let editBtn = document.createElement('i'); editBtn.className = 'fa-solid fa-pen';
                editBtn.onclick = (e) => { e.stopPropagation(); renameSubject(sub.id); };
                
                let delBtn = document.createElement('i'); delBtn.className = 'fa-solid fa-trash';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteSubject(sub.id); };

                actionsDiv.appendChild(editBtn); actionsDiv.appendChild(delBtn);
                li.appendChild(actionsDiv);
                list.appendChild(li);
            });
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            if(!currentSubjectId) { loadEditorContent(); return; }
            
            let subject = appData.subjects.find(s => s.id === currentSubjectId);
            subject.docs.forEach(doc => {
                let div = document.createElement('div');
                div.className = `tab ${doc.id === currentDocId ? 'active' : ''}`;
                
                let nameSpan = document.createElement('span');
                nameSpan.textContent = doc.title;
                nameSpan.onclick = () => { currentDocId = doc.id; renderTabs(); loadEditorContent(); };
                div.appendChild(nameSpan);

                if (doc.id === currentDocId) {
                    let actionsDiv = document.createElement('div');
                    actionsDiv.className = 'tab-actions';

                    let editBtn = document.createElement('i'); editBtn.className = 'fa-solid fa-pen';
                    editBtn.onclick = (e) => { e.stopPropagation(); renameTab(doc.id); };
                    
                    let delBtn = document.createElement('i'); delBtn.className = 'fa-solid fa-times';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteTab(doc.id); };

                    actionsDiv.appendChild(editBtn); actionsDiv.appendChild(delBtn);
                    div.appendChild(actionsDiv);
                }
                container.appendChild(div);
            });
            loadEditorContent();
        }

        function addNewTab() {
            if(!currentSubjectId) return alert("Vui lòng chọn hoặc tạo Môn học bên trái trước!");
            let title = prompt('Tên tab mới:');
            if(title) {
                let subject = appData.subjects.find(s => s.id === currentSubjectId);
                let newDoc = { id: generateId(), title: title, content: `<h1>${title}</h1>` };
                subject.docs.push(newDoc);
                currentDocId = newDoc.id; 
                saveData(); renderTabs();
                setTimeout(() => {
                    let container = document.getElementById('tabs-container');
                    container.scrollLeft = container.scrollWidth;
                }, 50);
            }
        }

        document.getElementById('add-subject-btn').onclick = () => {
            let name = prompt('Tên môn học:');
            if(name) {
                appData.subjects.push({ id: generateId(), name: name, docs: [] });
                saveData(); renderSubjects();
            }
        };

        function loadEditorContent() {
            if(!currentSubjectId || !currentDocId) { quill.root.innerHTML = ''; quill.disable(); return; }
            quill.enable();
            let doc = appData.subjects.find(s => s.id === currentSubjectId).docs.find(d => d.id === currentDocId);
            quill.root.innerHTML = doc.content || '';
        }

        function exportToPDF() {
            document.getElementById('pdf-modal').style.display = 'none';
            if(!currentDocId) return alert("Chọn tài liệu để xuất PDF!");
            let doc = appData.subjects.find(s => s.id === currentSubjectId).docs.find(d => d.id === currentDocId);
            
            let mTop = parseFloat(document.getElementById('m-top').value) || 20;
            let mBottom = parseFloat(document.getElementById('m-bottom').value) || 20;
            let mLeft = parseFloat(document.getElementById('m-left').value) || 25;
            let mRight = parseFloat(document.getElementById('m-right').value) || 20;

            let printElement = document.createElement('div');
            printElement.innerHTML = doc.content;
            printElement.style.fontFamily = "'Times New Roman', serif";
            printElement.style.fontSize = "16px";
            printElement.style.lineHeight = "1.6";

            var opt = {
                margin:       [mTop, mRight, mBottom, mLeft],
                filename:     `${doc.title}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(printElement).save();
        }
    </script>
